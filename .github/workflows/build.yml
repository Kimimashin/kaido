name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # This logs into Docker Hub using secrets we will create next
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # This builds your Dockerfile and pushes it to Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/docker

    # Authenticate to Google Cloud
    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # Deploy the image to Google Cloud Run with a max instance limit of 10
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy xray-server \
          --image=docker.io/${{ secrets.DOCKER_USERNAME }}/docker \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --max-instances=10
